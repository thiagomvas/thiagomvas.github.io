    <div class="top-bar">

    <div class="background">

            </a>
            <a href="https://github.com/thiagomvas" target="_blank" class="tooltip">

        </div>
        </div>

    <div class="content" id="aboutme">

        <div class="aboutme-container">

        <p>Content for section 4. Add more details or elements to this section.</p>
    </div>


    <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0">
        <defs>
            <clipPath id="rounded-clip">
                <!-- Simple circular clip-path -->
                <circle cx="50%" cy="50%" r="50%" />
            </clipPath>
        </defs>
    </svg>
    <script src="script.js"></script>
    <script src="locales/en.json"></script>
