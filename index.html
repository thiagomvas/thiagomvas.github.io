<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">

    <title>Thiago M. Vasconcelos</title>
</head>
<body>
    <div class="top-bar">
        <a href="#aboutme">&lt;/<span class="primary"><span data-localize="aboutmetitle"></span></span>&gt;</a>
        <a href="#skills">&lt;/<span class="primary"><span data-localize="skillstitle"></span></span>&gt;</a>
        <a href="#projects">&lt;/<span class="primary"><span data-localize="projectstitle"></span></span>&gt;</a>
        <a href="#contact">&lt;/<span class="primary"><span data-localize="contacttitle"></span></span>&gt;</a>
    </div>

    <div class="background">
        <div class="hero">
            <div data-localize="greeting">Hi there! 👋</div>
            <div><span data-localize="nameis"></span> <span class="primary">Thiago M. Vasconcelos</span></div>
            <div><span data-localize="iama"></span> <span class="primary" id="title">Software Developer</span></div>

        <div class="social-icons">
            <!-- LinkedIn Icon -->
            <a href="https://linkedin.com/in/thiago-m-vasconcelos" target="_blank" class="tooltip">
                <span class="tooltiptext">LinkedIn</span>
                <img src="Assets/linkedin.svg" alt="LinkedIn" width="32" height="32">
            </a>
            <a href="https://github.com/thiagomvas" target="_blank" class="tooltip">
                <span class="tooltiptext">Github</span>
                <img src="Assets/github.svg" alt="LinkedIn" width="32" height="32">
            </a>
        </div>
        </div>
        </div>
    </div>

    <div class="content" id="aboutme">

        <div class="aboutme-container">
            <div class="aboutme-image">
                <img src="Assets/1700862378277.jfif" alt="About Me">
            </div>
            <div class="aboutme-description">
                <h2 data-localize="aboutmetitle"></h2>
                <p data-localize="aboutme"></p>
            </div>
        </div>
    </div>

    <div class="section skills" id="skills">
        <div class="skills-wrapper">
            <h1 data-localize="skillstitle" class="skills-title"></h1>
            <div class="skills-container" id="skills-tab"></div>
        </div>
        <div class="techs-wrapper">
            <h1 data-localize="techstitle" class="techs-title"></h1>
            <div class="techs-container" id="techs-tab"></div>
        </div>
    </div>
    

    <div class="section" id="projects">
            <div class="projects-container">
                <h1 data-localize="projectstitle" class="projects-title"></h1>
                <div class="project-tab" id="projects-tab">
                </div>
            </div>
    </div>

    <div class="section" id="contact">
        <h2 data-localize="contactheader"></h2>
        <p data-localize="contactmessage"></p>
        
        <!-- Contact Details -->
        <div class="contact-details">
            <p><strong>Email:</strong> <a href="mailto:thiagomvas@gmail.com">thiagomvas@gmail.com</a></p>
            <p><strong>LinkedIn:</strong> <a href="https://linkedin.com/in/thiago-m-vasconcelos" target="_blank">Thiago M Vasconcelos</a></p>
            <p><strong>GitHub:</strong> <a href="https://github.com/thiagomvas" target="_blank">Thiagomvas</a></p>
        </div>
    </div>
    
    


    <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0">
        <defs>
            <clipPath id="rounded-clip">
                <!-- Simple circular clip-path -->
                <circle cx="50%" cy="50%" r="50%" />
            </clipPath>
        </defs>
    </svg>
    <script src="script.js"></script>
    <script src="locales/en.json"></script>
    <script src="locales/pt.json"></script>
</body>
</html>
